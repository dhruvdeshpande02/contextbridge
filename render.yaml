databases:
  - name: contextbridge-db
    databaseName: contextbridge
    user: contextbridge
    plan: free
    postgresMajorVersion: 16

services:
  # ── Redis ──────────────────────────────────────────────────────────────────
  - type: redis
    name: contextbridge-redis
    plan: free
    ipAllowList: []

  # ── API + Worker (combined, free tier doesn't support background workers) ──
  - type: web
    name: contextbridge-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: |
      python -c "
      from sqlalchemy import create_engine, text
      import os
      e = create_engine(os.environ['DATABASE_URL'])
      with e.connect() as c:
          c.execute(text('CREATE EXTENSION IF NOT EXISTS vector'))
          c.commit()
      " && alembic upgrade head && supervisord -c supervisord.conf
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: contextbridge-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: contextbridge-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false   # set to https://contextbridge-frontend.onrender.com after first deploy

  # ── Frontend ───────────────────────────────────────────────────────────────
  - type: web
    name: contextbridge-frontend
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm ci --quiet && npm run build && cp -r .next/static .next/standalone/.next/static && cp -r public .next/standalone/public
    startCommand: node .next/standalone/server.js
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false   # set to https://contextbridge-api.onrender.com after API deploys
